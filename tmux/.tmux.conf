
# leader r: reload tmux conf
unbind r
bind r source-file ~/.tmux.conf

# Options to make tmux more pleasant
set -g mode-keys vi
set -g mouse on
set -g default-terminal "tmux-256color"
set-option -g status-position top


# Remap copy and selection keys for Wayland
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# rebind pane select keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# integrate fzf: https://github.com/sainnhe/tmux-fzf
set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'catppuccin/tmux'
# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"

set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
#set -agF status-right "#{E:@catppuccin_status_battery}"

# Force catppuccin to display the actual window name
set -ogq @catppuccin_window_text " #W"
set -ogq @catppuccin_window_default_text " #W"
set -ogq @catppuccin_window_current_text " #W"
set-option -g allow-rename off


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
